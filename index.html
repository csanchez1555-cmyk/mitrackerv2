<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Progreso">
<title>Mi Progreso · CDMX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #080810;
  --sur:    #0f0f1a;
  --sur2:   #181826;
  --brd:    #252535;
  --lime:   #d4ff3a;
  --coral:  #ff5f5f;
  --sky:    #38b6ff;
  --violet: #b03aff;
  --mint:   #3affb0;
  --text:   #eeeef8;
  --muted:  #5a5a78;
  --fn:     'Syne', sans-serif;
  --mono:   'JetBrains Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--fn);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(212,255,58,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,255,58,.025) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 16px 80px;
}

/* SAVE INDICATOR */
#saveIndicator {
  position: fixed;
  top: 12px;
  right: 12px;
  font-family: var(--mono);
  font-size: .6rem;
  padding: 5px 10px;
  border-radius: 6px;
  background: var(--lime);
  color: #080810;
  font-weight: 600;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity .3s, transform .3s;
  z-index: 999;
  pointer-events: none;
}
#saveIndicator.show { opacity: 1; transform: translateY(0); }

/* HEADER */
header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--brd);
}
header h1 { font-size: clamp(1.4rem, 5vw, 2rem); font-weight: 800; letter-spacing: -.04em; line-height: 1; }
header h1 span { color: var(--lime); }
.sub { font-family: var(--mono); font-size: .62rem; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 6px; }
.date-badge { font-family: var(--mono); font-size: .62rem; color: var(--muted); background: var(--sur); border: 1px solid var(--brd); padding: 6px 12px; border-radius: 7px; white-space: nowrap; }

/* SECTION LABEL */
.slabel { font-family: var(--mono); font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding-left: 2px; }

/* CHIPS */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
.chip { display: flex; align-items: center; gap: 8px; background: var(--sur); border: 1px solid var(--brd); border-radius: 9px; padding: 9px 14px; font-family: var(--mono); font-size: .68rem; flex: 1; min-width: 140px; }
.chip .cv { font-family: var(--fn); font-size: 1.1rem; font-weight: 700; margin-left: auto; }

/* PROGRESS */
.pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 24px; }
.pcard { background: var(--sur); border: 1px solid var(--brd); border-radius: 12px; padding: 15px; transition: border-color .18s; }
.pcard:hover { border-color: var(--lime); }
.pcard .plbl { font-size: .7rem; color: var(--muted); margin-bottom: 4px; }
.pcard .pval { font-size: 1.6rem; font-weight: 800; letter-spacing: -.05em; line-height: 1; margin-bottom: 9px; }
.pbar { height: 4px; background: var(--sur2); border-radius: 99px; overflow: hidden; }
.pfill { height: 100%; border-radius: 99px; transition: width .55s cubic-bezier(.22,1,.36,1); }
.pcard .psub { font-family: var(--mono); font-size: .57rem; color: var(--muted); margin-top: 6px; }

/* CHART */
.chart-wrap { background: var(--sur); border: 1px solid var(--brd); border-radius: 12px; padding: 18px; margin-bottom: 24px; }
.bars { display: flex; align-items: flex-end; gap: 6px; height: 90px; margin-bottom: 4px; }
.bcol { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 4px; }
.bfill { width: 100%; border-radius: 4px 4px 0 0; transition: height .5s cubic-bezier(.22,1,.36,1); min-height: 3px; }
.blbl { font-family: var(--mono); font-size: .58rem; }
.bnum { font-family: var(--mono); font-size: .52rem; color: var(--muted); }

/* HABITS */
.habit-section { margin-bottom: 24px; }
.hrow { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.hname { font-size: .73rem; width: 130px; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.hdots { display: flex; gap: 3px; flex-wrap: wrap; }
.hdot { width: 16px; height: 16px; border-radius: 3px; cursor: pointer; transition: transform .1s; flex-shrink: 0; border: none; outline: none; position: relative; -webkit-tap-highlight-color: transparent; }
.hdot:hover, .hdot:active { transform: scale(1.3); }
.hdot.off { background: var(--sur2); border: 1px solid var(--brd); }
.hdot.today-dot::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--lime); }
.hstreak { font-family: var(--mono); font-size: .58rem; margin-left: 6px; white-space: nowrap; }

/* TASKS */
.checklist { margin-bottom: 24px; }
.titem { display: flex; align-items: center; gap: 10px; padding: 11px 12px; background: var(--sur); border: 1px solid var(--brd); border-radius: 10px; margin-bottom: 7px; user-select: none; transition: background .12s; -webkit-tap-highlight-color: transparent; }
.titem:active { background: var(--sur2); }
.titem.done { opacity: .4; }
.titem.done .ttext { text-decoration: line-through; color: var(--muted); }
.tchk { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--brd); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: .7rem; cursor: pointer; transition: background .12s, border-color .12s; background: transparent; color: #000; min-width: 20px; }
.titem.done .tchk { background: var(--lime); border-color: var(--lime); }
.ttext { font-size: .82rem; flex: 1; cursor: pointer; }
.ttag { font-family: var(--mono); font-size: .56rem; padding: 2px 7px; border-radius: 99px; letter-spacing: .05em; text-transform: uppercase; flex-shrink: 0; }
.tdel { background: none; border: none; color: var(--muted); font-size: .9rem; cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: color .12s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
.tdel:active { color: var(--coral); }

.add-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.add-row input { flex: 1; min-width: 140px; background: var(--sur); border: 1px solid var(--brd); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: var(--fn); font-size: .8rem; outline: none; transition: border-color .13s; -webkit-appearance: none; }
.add-row input:focus { border-color: var(--lime); }
.add-row input::placeholder { color: var(--muted); }
.add-row select { background: var(--sur); border: 1px solid var(--brd); border-radius: 8px; padding: 10px 8px; color: var(--text); font-family: var(--mono); font-size: .68rem; outline: none; cursor: pointer; -webkit-appearance: none; }
.btn { background: var(--lime); color: #080810; border: none; border-radius: 8px; padding: 10px 18px; font-family: var(--fn); font-weight: 700; font-size: .8rem; cursor: pointer; transition: opacity .13s; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
.btn:active { opacity: .8; }

/* SLIDERS */
.sliders { background: var(--sur); border: 1px solid var(--brd); border-radius: 12px; padding: 18px; margin-bottom: 24px; }
.srow { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.srow:last-child { margin-bottom: 0; }
.srow label { font-family: var(--mono); font-size: .62rem; color: var(--muted); width: 165px; flex-shrink: 0; }
.srow input[type=range] { flex: 1; min-width: 80px; accent-color: var(--lime); cursor: pointer; }
.sval { font-family: var(--mono); font-size: .7rem; color: var(--lime); width: 50px; text-align: right; }

/* TOAST */
#toast { position: fixed; bottom: 20px; right: 16px; background: var(--lime); color: #080810; font-family: var(--mono); font-size: .68rem; font-weight: 600; padding: 9px 16px; border-radius: 8px; opacity: 0; transform: translateY(6px); transition: opacity .25s, transform .25s; pointer-events: none; z-index: 998; }
#toast.show { opacity: 1; transform: translateY(0); }

/* RESPONSIVE */
@media (max-width: 480px) {
  .hname { width: 100px; font-size: .65rem; }
  .hdot { width: 13px; height: 13px; }
  .srow label { width: 100%; }
  .chip { min-width: 120px; }
}
</style>
</head>
<body>
<div id="saveIndicator">✓ Guardado</div>
<div id="toast"></div>

<div class="app">
  <header>
    <div>
      <h1>Mi <span>Progreso</span></h1>
      <div class="sub">Tracker personal · CDMX · 18-month roadmap</div>
    </div>
    <div class="date-badge" id="dateBadge">—</div>
  </header>

  <div class="slabel">⚡ Estado actual</div>
  <div class="chips" id="chips"></div>

  <div class="slabel">📊 Métricas de objetivos</div>
  <div class="pgrid" id="pgrid"></div>

  <div class="slabel">📅 Hábitos completados — última semana</div>
  <div class="chart-wrap"><div class="bars" id="bars"></div></div>

  <div class="slabel">🔲 Calendario de hábitos — últimos 30 días</div>
  <div class="habit-section" id="habitSection"></div>

  <div class="slabel">✅ Checklist de hoy</div>
  <div class="checklist">
    <div id="taskList"></div>
    <div class="add-row">
      <input type="text" id="taskInput" placeholder="Nueva tarea..." />
      <select id="taskCat">
        <option value="study">📚 Estudio</option>
        <option value="work">💼 Trabajo</option>
        <option value="health">💪 Salud</option>
        <option value="habit">⚡ Hábito</option>
      </select>
      <button class="btn" id="addBtn">+ Agregar</button>
    </div>
  </div>

  <div class="slabel">🎯 Ajustar metas</div>
  <div class="sliders" id="sliders"></div>
</div>

<script>
// ═══════════════════════════════════════════
// STORAGE — funciona en localStorage Y en memoria
// ═══════════════════════════════════════════
const SKEY = 'mitracker_v3';
let _mem = null;

function storeSave(obj) {
  const json = JSON.stringify(obj);
  try { localStorage.setItem(SKEY, json); } catch(_) {}
  try { sessionStorage.setItem(SKEY, json); } catch(_) {}
  _mem = json;
}

function storeLoad() {
  try {
    const a = localStorage.getItem(SKEY);
    if (a) return JSON.parse(a);
  } catch(_) {}
  try {
    const b = sessionStorage.getItem(SKEY);
    if (b) return JSON.parse(b);
  } catch(_) {}
  if (_mem) { try { return JSON.parse(_mem); } catch(_) {} }
  return null;
}

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const CAT = {
  study:  { color: '#38b6ff', label: 'Estudio'  },
  work:   { color: '#d4ff3a', label: 'Trabajo'  },
  health: { color: '#b03aff', label: 'Salud'    },
  habit:  { color: '#ff5f5f', label: 'Hábito'   },
};

const HABITS = [
  { key: 'python',     icon: '🐍', label: 'Python / IA',  color: '#38b6ff' },
  { key: 'math',       icon: '📐', label: 'Matemáticas',  color: '#d4ff3a' },
  { key: 'english',    icon: '🇬🇧', label: 'Inglés',      color: '#b03aff' },
  { key: 'exercise',   icon: '🏃', label: 'Ejercicio',    color: '#ff5f5f' },
  { key: 'noJunkFood', icon: '🥗', label: 'Comida sana',  color: '#3affb0' },
];

const DNAMES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

// ═══════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════
const NOW   = new Date();
const TODAY = toISO(NOW);

function toISO(d) { return d.toISOString().split('T')[0]; }
function wday(d)  { return (d.getDay() + 6) % 7; } // Mon=0..Sun=6
function dOffset(n) { const d = new Date(NOW); d.setDate(d.getDate() - n); return toISO(d); }
function last30()   { const a=[]; for(let i=29;i>=0;i--) a.push(dOffset(i)); return a; }
function last7()    { const a=[]; for(let i=6;i>=0;i--)  a.push(dOffset(i)); return a; }

// ═══════════════════════════════════════════
// DEFAULT STATE
// ═══════════════════════════════════════════
function mkDefault() {
  const habits = {};
  HABITS.forEach(h => { habits[h.key] = {}; });
  return {
    v: 3,
    goals: {
      studyHrsDay: 1,
      monthIncomeGoal: 800,
      monthIncomeNow: 0,
      exerciseDaysGoal: 4,
      phaseMonth: 1,
    },
    habits,
    tasks: [
      { id:1, text:'Estudiar Pre-Álgebra — Khan Academy (1h)', cat:'study',  done:false },
      { id:2, text:'Completar turno DiDi / Uber',              cat:'work',   done:false },
      { id:3, text:'30 min de ejercicio',                      cat:'health', done:false },
      { id:4, text:'Revisar noticias geopolíticas (15 min)',   cat:'habit',  done:false },
      { id:5, text:'Practicar vocabulario en inglés',          cat:'habit',  done:false },
    ],
    taskDate: TODAY,
    nextId: 6,
  };
}

// ═══════════════════════════════════════════
// INIT STATE
// ═══════════════════════════════════════════
let state;
(function init() {
  const saved = storeLoad();
  if (!saved || saved.v !== 3) {
    state = mkDefault();
    storeSave(state);
    return;
  }
  state = saved;
  // Daily reset
  if (state.taskDate !== TODAY) {
    state.tasks = state.tasks.map(t => ({...t, done: false}));
    state.taskDate = TODAY;
    storeSave(state);
  }
})();

function save() {
  storeSave(state);
  // Flash save indicator
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1200);
}

// ═══════════════════════════════════════════
// HABIT HELPERS
// ═══════════════════════════════════════════
function hOn(key, date)    { return !!state.habits[key][date]; }
function hToggle(key, date){ state.habits[key][date] = !state.habits[key][date]; save(); renderAll(); }

function streak(key) {
  let s=0, i=0;
  while(hOn(key, dOffset(i))) { s++; i++; }
  return s;
}

function countIn(key, dates) { return dates.reduce((c,d) => c + (hOn(key,d)?1:0), 0); }
function doneOnDate(date)    { return HABITS.reduce((c,h) => c + (hOn(h.key,date)?1:0), 0); }

// ═══════════════════════════════════════════
// DERIVED METRICS
// ═══════════════════════════════════════════
function studyHrsWeek() {
  const w = last7();
  const sessions = countIn('python',w) + countIn('math',w) + countIn('english',w);
  return +(sessions * state.goals.studyHrsDay).toFixed(1);
}
function exDaysWeek() { return countIn('exercise', last7()); }
function weekBars()   { return last7().map(d => doneOnDate(d)); }

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function $(id) { return document.getElementById(id); }

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2000);
}

function renderDate() {
  $('dateBadge').textContent = NOW.toLocaleDateString('es-MX',
    { weekday:'long', day:'numeric', month:'long' });
}

function renderChips() {
  const done  = state.tasks.filter(t=>t.done).length;
  const total = state.tasks.length;
  const chips = [
    { icon:'🔥', label:'Racha Python/IA',  val:`${streak('python')} días`,   color:'#38b6ff' },
    { icon:'💪', label:'Racha ejercicio',  val:`${streak('exercise')} días`, color:'#b03aff' },
    { icon:'✅', label:'Tareas hoy',        val:`${done}/${total}`,           color:'#d4ff3a' },
    { icon:'📅', label:'Roadmap',          val:`Mes ${state.goals.phaseMonth}/18`, color:'#ff5f5f' },
  ];
  $('chips').innerHTML = chips.map(c=>`
    <div class="chip">
      <span>${c.icon}</span>
      <span style="color:var(--muted)">${c.label}</span>
      <span class="cv" style="color:${c.color}">${c.val}</span>
    </div>`).join('');
}

function renderProgress() {
  const g=state.goals, shw=studyHrsWeek(), edw=exDaysWeek();
  const cards = [
    { label:'Estudio esta semana',    val:`${shw}h`,
      fill:Math.min(100,(shw/Math.max(.1,g.studyHrsDay*7))*100),
      color:'#38b6ff', sub:`Meta: ${g.studyHrsDay}h/día · ${+(g.studyHrsDay*7).toFixed(1)}h/sem` },
    { label:'Ingresos del mes (USD)', val:`$${g.monthIncomeNow}`,
      fill:Math.min(100,(g.monthIncomeNow/Math.max(1,g.monthIncomeGoal))*100),
      color:'#d4ff3a', sub:`Meta: $${g.monthIncomeGoal} · ${Math.round((g.monthIncomeNow/Math.max(1,g.monthIncomeGoal))*100)}%` },
    { label:'Ejercicio esta semana',  val:`${edw}/${g.exerciseDaysGoal}d`,
      fill:Math.min(100,(edw/Math.max(1,g.exerciseDaysGoal))*100),
      color:'#b03aff', sub:`Meta: ${g.exerciseDaysGoal} días/semana` },
    { label:'Roadmap IA/Python',      val:`${Math.round((g.phaseMonth/18)*100)}%`,
      fill:(g.phaseMonth/18)*100,
      color:'#ff5f5f', sub:`Fase ${g.phaseMonth} de 18 meses` },
  ];
  $('pgrid').innerHTML = cards.map(c=>`
    <div class="pcard">
      <div class="plbl">${c.label}</div>
      <div class="pval" style="color:${c.color}">${c.val}</div>
      <div class="pbar"><div class="pfill" style="width:${c.fill}%;background:${c.color}"></div></div>
      <div class="psub">${c.sub}</div>
    </div>`).join('');
}

function renderBars() {
  const data=weekBars(), max=HABITS.length, dates=last7();
  $('bars').innerHTML = data.map((v,i)=>{
    const isToday = dates[i]===TODAY;
    const pct = max>0 ? Math.round((v/max)*100) : 0;
    const d = new Date(dates[i]+'T12:00:00');
    const lbl = DNAMES[wday(d)];
    return `<div class="bcol">
      <div class="bnum">${v||''}</div>
      <div class="bfill" style="height:${Math.max(3,pct)}%;background:${isToday?'#d4ff3a':'#252535'}"></div>
      <div class="blbl" style="color:${isToday?'#d4ff3a':'var(--muted)'}">${lbl}</div>
    </div>`;
  }).join('');
}

function renderHabits() {
  const dates = last30();
  $('habitSection').innerHTML = HABITS.map(h=>{
    const dots = dates.map(d=>{
      const on=hOn(h.key,d), isToday=d===TODAY;
      const cls=['hdot', on?'on':'off', isToday?'today-dot':''].filter(Boolean).join(' ');
      const style = on ? `background:${h.color}` : '';
      const dObj = new Date(d+'T12:00:00');
      const tip = dObj.toLocaleDateString('es-MX',{day:'numeric',month:'short'});
      return `<button class="hdot ${cls}" style="${style}" onclick="hToggle('${h.key}','${d}')" title="${tip}"></button>`;
    }).join('');
    const s = streak(h.key);
    return `<div class="hrow">
      <div class="hname"><span>${h.icon}</span><span>${h.label}</span></div>
      <div class="hdots">${dots}</div>
      <div class="hstreak" style="color:${h.color}">🔥${s}d</div>
    </div>`;
  }).join('');
}

function renderTasks() {
  $('taskList').innerHTML = state.tasks.length ? state.tasks.map(t=>{
    const c = CAT[t.cat]||CAT.habit;
    return `<div class="titem ${t.done?'done':''}">
      <div class="tchk" onclick="toggleTask(${t.id})">${t.done?'✓':''}</div>
      <div class="ttext" onclick="toggleTask(${t.id})">${t.text}</div>
      <span class="ttag" style="background:${c.color}1a;color:${c.color}">${c.label}</span>
      <button class="tdel" onclick="deleteTask(${t.id})">✕</button>
    </div>`;
  }).join('') :
  '<p style="font-family:var(--mono);font-size:.7rem;color:var(--muted);padding:10px 0">Sin tareas. Agrega una abajo ↓</p>';
}

const SCFG = [
  { key:'studyHrsDay',     label:'Meta horas estudio / día',  min:.5, max:8,    step:.5, unit:'h'   },
  { key:'monthIncomeGoal', label:'Meta ingresos / mes (USD)', min:100,max:5000, step:50, unit:'$'   },
  { key:'monthIncomeNow',  label:'Ingresos actuales (USD)',   min:0,  max:5000, step:50, unit:'$'   },
  { key:'exerciseDaysGoal',label:'Meta ejercicio / semana',   min:1,  max:7,    step:1,  unit:'d'   },
  { key:'phaseMonth',      label:'Mes del roadmap',           min:1,  max:18,   step:1,  unit:'/18' },
];

function renderSliders() {
  $('sliders').innerHTML = SCFG.map(s=>`
    <div class="srow">
      <label>${s.label}</label>
      <input type="range" min="${s.min}" max="${s.max}" step="${s.step}"
        value="${state.goals[s.key]}"
        oninput="onSlider('${s.key}','${s.unit}',this)"/>
      <div class="sval" id="sv_${s.key}">${state.goals[s.key]}${s.unit}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function toggleTask(id) {
  const t = state.tasks.find(t=>t.id===id);
  if(t){ t.done=!t.done; save(); renderTasks(); renderChips(); }
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t=>t.id!==id);
  save(); renderTasks(); renderChips();
  showToast('Tarea eliminada');
}

function addTask() {
  const inp=$('taskInput'), cat=$('taskCat').value, text=inp.value.trim();
  if(!text){ inp.focus(); return; }
  state.tasks.push({ id:state.nextId++, text, cat, done:false });
  inp.value=''; save(); renderTasks(); renderChips();
  showToast('✓ Tarea agregada');
}

function onSlider(key, unit, el) {
  state.goals[key] = parseFloat(el.value);
  const sv = $('sv_'+key);
  if(sv) sv.textContent = el.value + unit;
  save(); renderChips(); renderProgress();
}

// ═══════════════════════════════════════════
// EXPOSE GLOBALS
// ═══════════════════════════════════════════
window.hToggle    = hToggle;
window.toggleTask = toggleTask;
window.deleteTask = deleteTask;
window.addTask    = addTask;
window.onSlider   = onSlider;

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
$('addBtn').addEventListener('click', addTask);
$('taskInput').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });

// Save before page closes
window.addEventListener('beforeunload', () => storeSave(state));
window.addEventListener('pagehide',     () => storeSave(state));
window.addEventListener('visibilitychange', () => {
  if(document.visibilityState==='hidden') storeSave(state);
});

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
function renderAll() {
  renderChips(); renderProgress(); renderBars(); renderHabits(); renderTasks();
}

renderDate(); renderAll(); renderSliders();
</script>
</body>
</html>
