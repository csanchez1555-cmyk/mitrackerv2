<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tracker V4</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  font-size: 24px;
}
.light {
  background: white;
  color: black;
}
h1 { font-size: 36px; }
.block {
  background: #222;
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
}
.light .block { background: #ddd; }
button {
  font-size: 24px;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
}
textarea {
  width: 90%;
  height: 120px;
  font-size: 22px;
}
.reset {
  background: red;
  color: white;
}
</style>

</head>

<body>

<h1>🧠 English Tracker</h1>

<button onclick="toggleMode()">🌗 Mode</button>

<div class="block">
<h2>INPUT</h2>
<button onclick="addTime('input',15)">+15</button>
<p id="input"></p>
</div>

<div class="block">
<h2>SHADOWING</h2>
<button onclick="addTime('shadow',10)">+10</button>
<p id="shadow"></p>
</div>

<div class="block">
<h2>OUTPUT</h2>
<button onclick="addTime('output',20)">+20</button>
<p id="output"></p>
</div>

<div class="block">
<h2>🎤 Record Speaking</h2>
<button onclick="startRecording()">Start</button>
<button onclick="stopRecording()">Stop</button>
<br><br>
<audio id="audioPlayback" controls></audio>
</div>

<div class="block">
<h2>🧱 Frases</h2>
<textarea id="phrases"></textarea>
<button onclick="savePhrases()">Save</button>
</div>

<div class="block">
<h2>📊 Score</h2>
<p id="score"></p>
<canvas id="chart" width="300" height="150"></canvas>
</div>

<button class="reset" onclick="resetDay()">RESET DAY</button>

<script>
let data = JSON.parse(localStorage.getItem('tracker')) || {
  input: 0,
  shadow: 0,
  output: 0,
  history: []
};

function updateUI() {
  document.getElementById('input').innerText = data.input + "/60";
  document.getElementById('shadow').innerText = data.shadow + "/30";
  document.getElementById('output').innerText = data.output + "/60";

  let score = data.input + data.shadow + data.output;
  document.getElementById('score').innerText = score + "/150";

  drawChart();

  localStorage.setItem('tracker', JSON.stringify(data));
}

function addTime(type, val) {
  data[type] += val;
  updateUI();
}

function resetDay() {
  let score = data.input + data.shadow + data.output;
  data.history.push(score);
  data.input = 0;
  data.shadow = 0;
  data.output = 0;
  updateUI();
}

function toggleMode() {
  document.body.classList.toggle('light');
}

// 🎤 RECORDING
let mediaRecorder;
let audioChunks = [];

async function startRecording() {
  let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.start();

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };
}

function stopRecording() {
  mediaRecorder.stop();
  mediaRecorder.onstop = () => {
    let blob = new Blob(audioChunks);
    let url = URL.createObjectURL(blob);
    document.getElementById('audioPlayback').src = url;
    audioChunks = [];
  };
}

// 📊 CHART
function drawChart() {
  let canvas = document.getElementById('chart');
  let ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,300,150);

  data.history.slice(-7).forEach((val,i)=>{
    ctx.fillRect(i*40,150-val,30,val);
  });
}

// 💾 FRASES
function savePhrases(){
  let text = document.getElementById('phrases').value;
  localStorage.setItem('phrases', text);
}

window.onload = function(){
  updateUI();
  document.getElementById('phrases').value = localStorage.getItem('phrases') || "";
};
</script>

</body>
</html>
